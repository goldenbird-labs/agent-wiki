<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Bot head -->
  <rect x="7" y="11" width="18" height="13" rx="3.5" fill="white" opacity="0.95"/>

  <!-- Eyes -->
  <circle cx="12" cy="16.5" r="2.2" fill="#4F46E5"/>
  <circle cx="20" cy="16.5" r="2.2" fill="#4F46E5"/>
  <circle cx="12.8" cy="15.8" r="0.7" fill="white"/>
  <circle cx="20.8" cy="15.8" r="0.7" fill="white"/>

  <!-- Mouth -->
  <rect x="11.5" y="20.5" width="9" height="1.5" rx="0.75" fill="#4F46E5" opacity="0.4"/>

  <!-- Antenna stem -->
  <rect x="15.25" y="6.5" width="1.5" height="4.5" rx="0.75" fill="white" opacity="0.85"/>
  <!-- Antenna tip -->
  <circle cx="16" cy="6" r="1.8" fill="white" opacity="0.85"/>

  <!-- Ears / side connectors -->
  <rect x="5" y="14.5" width="2" height="4" rx="1" fill="white" opacity="0.6"/>
  <rect x="25" y="14.5" width="2" height="4" rx="1" fill="white" opacity="0.6"/>
</svg>
